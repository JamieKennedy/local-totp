version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-patch-minor:
        patterns: ["*"]
        update-types: ["patch", "minor"]
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      frontend-patch-minor:
        patterns: ["*"]
        update-types: ["patch", "minor"]
  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    groups:
      documentation-site-patch-minor:
        patterns: ["*"]
        update-types: ["patch", "minor"]
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      containers-patch-minor:
        patterns: ["*"]
        update-types: ["patch", "minor"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-patch-minor:
        patterns: ["*"]
        update-types: ["patch", "minor"]
