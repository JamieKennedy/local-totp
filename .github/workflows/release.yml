name: release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/verify.yml

  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: version
        run: |
          VERSION="$(cat VERSION)"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  binaries:
    needs: [verify, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: 1.26.5
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build embedded frontend
        run: |
          npm --prefix web ci
          npm --prefix web run build
          cp -R web/dist internal/webui/dist
      - name: Build archives
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir -p release stage
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            NAME="local-totp_${VERSION}_${GOOS}_${GOARCH}"
            EXT=""
            if [ "$GOOS" = windows ]; then EXT=".exe"; fi
            mkdir -p "stage/${NAME}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -tags webui_dist -trimpath \
              -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA}" \
              -o "stage/${NAME}/local-totp${EXT}" ./cmd/local-totp
            cp README.md "stage/${NAME}/"
            if [ "$GOOS" = windows ]; then
              (cd stage && zip -qr "../release/${NAME}.zip" "${NAME}")
            else
              tar -C stage -czf "release/${NAME}.tar.gz" "${NAME}"
            fi
          done
      - name: Create SPDX SBOM
        run: |
          go install github.com/anchore/syft/cmd/syft@v1.29.0
          syft dir:. -o spdx-json=release/local-totp-source.spdx.json
      - name: Create checksums and release notes
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          (cd release && sha256sum local-totp_* > SHA256SUMS)
          awk -v version="$VERSION" '
            $0 ~ ("^## \\[" version "\\] - ") { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: release/*
      - name: Publish private GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --title "$GITHUB_REF_NAME" --notes-file release-notes.md

  image:
    needs: [verify, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          IMAGE="ghcr.io/jamiekennedy/local-totp"
          {
            echo "image=${IMAGE}"
            echo "tags<<EOF"
            echo "${IMAGE}:v${VERSION}"
            echo "${IMAGE}:${MAJOR}.${MINOR}"
            echo "${IMAGE}:${MAJOR}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            COMMIT=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ steps.image.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
