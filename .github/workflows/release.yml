name: release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/verify.yml

  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: version
        run: |
          VERSION="$(cat VERSION)"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  binaries:
    needs: [verify, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build embedded frontend
        run: |
          npm --prefix web ci
          npm --prefix web run build
          cp -R web/dist internal/webui/dist
      - name: Build archives
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir -p release stage
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            NAME="local-totp_${VERSION}_${GOOS}_${GOARCH}"
            EXT=""
            if [ "$GOOS" = windows ]; then EXT=".exe"; fi
            mkdir -p "stage/${NAME}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -tags webui_dist -trimpath \
              -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA}" \
              -o "stage/${NAME}/local-totp${EXT}" ./cmd/local-totp
            cp README.md "stage/${NAME}/"
            if [ "$GOOS" = windows ]; then
              (cd stage && zip -qr "../release/${NAME}.zip" "${NAME}")
            else
              tar -C stage -czf "release/${NAME}.tar.gz" "${NAME}"
            fi
          done
      - name: Create SPDX SBOM
        run: |
          go install github.com/anchore/syft/cmd/syft@v1.29.0
          syft dir:. -o spdx-json=release/local-totp-source.spdx.json
      - name: Create checksums and release notes
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          (cd release && sha256sum local-totp_* local-totp-source.spdx.json > SHA256SUMS)
          awk -v version="$VERSION" '
            $0 ~ ("^## \\[" version "\\] - ") { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
      # GitHub artifact attestations are unavailable for user-owned private repositories.
      - name: Attest release artifacts
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release/*
      - name: Publish private GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --title "$GITHUB_REF_NAME" --notes-file release-notes.md

  image:
    needs: [verify, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          IMAGE="ghcr.io/jamiekennedy/local-totp"
          {
            echo "image=${IMAGE}"
            echo "tags<<EOF"
            echo "${IMAGE}:v${VERSION}"
            echo "${IMAGE}:${MAJOR}.${MINOR}"
            echo "${IMAGE}:${MAJOR}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            COMMIT=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
      # Buildx publishes OCI provenance and an SBOM for private images above. The GitHub
      # artifact-attestation API is used only when the repository is public.
      - name: Attest container image
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.image.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
