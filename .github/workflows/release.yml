name: release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/verify.yml

  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - id: version
        run: |
          VERSION="$(cat VERSION)"
          node scripts/validate-version.mjs
          if [ "${GITHUB_EVENT_NAME}" = push ]; then
            test "${GITHUB_REF_NAME}" = "v${VERSION}"
          else
            echo "Manual dispatch is a dry run for v${VERSION}; it will not publish."
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  binaries:
    needs: [verify, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: 1.26.5
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build embedded frontend
        run: |
          npm --prefix web ci
          npm --prefix web run build
          cp -R web/dist internal/webui/dist
      - name: Build release archives
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir -p release stage
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            NAME="local-totp_${VERSION}_${GOOS}_${GOARCH}"
            EXT=""
            if [ "$GOOS" = windows ]; then EXT=".exe"; fi
            mkdir -p "stage/${NAME}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -tags webui_dist -trimpath \
              -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA}" \
              -o "stage/${NAME}/local-totp${EXT}" ./cmd/local-totp
            cp README.md LICENSE NOTICE THIRD_PARTY_NOTICES.md "stage/${NAME}/"
            if [ "$GOOS" = windows ]; then
              (cd stage && zip -qr "../release/${NAME}.zip" "${NAME}")
            else
              tar -C stage -czf "release/${NAME}.tar.gz" "${NAME}"
            fi
          done
      - name: Create SPDX SBOM and checksums
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          go install github.com/anchore/syft/cmd/syft@v1.29.0
          syft dir:. -o spdx-json=release/local-totp-source.spdx.json
          cp LICENSE NOTICE THIRD_PARTY_NOTICES.md release/
          (cd release && sha256sum local-totp_* LICENSE NOTICE THIRD_PARTY_NOTICES.md > SHA256SUMS)
          awk -v version="$VERSION" '
            $0 ~ ("^## \\[" version "\\] - ") { capture = 1; next }
            capture && /^## \\[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
      - name: Attest release artifacts
        if: github.event_name == 'push' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: release/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-bundle
          path: |
            release
            release-notes.md
          if-no-files-found: error
          retention-days: 14

  image:
    needs: [verify, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - name: Authenticate to GHCR for tagged publication
        if: github.event_name == 'push'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          IMAGE="ghcr.io/jamiekennedy/local-totp"
          {
            echo "image=${IMAGE}"
            echo "version-tag=${IMAGE}:v${VERSION}"
            echo "tags<<EOF"
            echo "${IMAGE}:v${VERSION}"
            echo "${IMAGE}:${MAJOR}.${MINOR}"
            echo "${IMAGE}:${MAJOR}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          provenance: mode=max
          sbom: true
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            COMMIT=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0
      - name: Scan published multi-architecture image
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.version-tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      - name: Attest container image
        if: github.event_name == 'push' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ steps.image.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  publish:
    if: github.event_name == 'push'
    needs: [validate, binaries, image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-bundle
          path: bundle
      - name: Create immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" bundle/release/*
          --repo "${GITHUB_REPOSITORY}" --verify-tag --title "${GITHUB_REF_NAME}"
          --notes-file bundle/release-notes.md
