name: verify

on:
  workflow_call:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5
          cache: true
      - name: Install analysis tools
        run: |
          go install golang.org/x/tools/cmd/goimports@v0.37.0
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Verify formatting and modules
        run: |
          test -z "$(gofmt -l .)"
          test -z "$(goimports -l .)"
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - run: go vet ./...
      - run: staticcheck ./...
      - run: govulncheck ./...
      - run: go test -race -coverprofile=coverage-go.out ./...
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage
          path: coverage-go.out
          retention-days: 7

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint -- --max-warnings=0
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: web/coverage
          retention-days: 7

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web ci
      - run: npm --prefix web run generate:api
      - run: git diff --exit-code -- web/src/api/schema.d.ts

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web ci
      - run: npm --prefix web run build
      - run: cp -R web/dist internal/webui/dist
      - run: mkdir -p bin && go build -tags webui_dist -o bin/local-totp ./cmd/local-totp
      - run: npx --prefix web playwright install --with-deps chromium
      - run: npm --prefix web run e2e
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-results
          path: |
            web/playwright-report
            web/test-results
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          tags: local-totp:verify

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Secret scan
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.27.2
          gitleaks git --redact --no-banner
      - run: npm --prefix web ci
      - run: npm --prefix web audit --omit=dev --audit-level=high
