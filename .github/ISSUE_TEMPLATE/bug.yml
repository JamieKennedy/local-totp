name: Bug report
description: Report a reproducible problem using synthetic data only.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never include a real TOTP seed, current code, password, recovery key, API key, backup, or database.
  - type: input
    id: version
    attributes:
      label: Version
      description: Exact release, image tag/digest, or commit.
      placeholder: v1.0.0
    validations:
      required: true
  - type: dropdown
    id: installation
    attributes:
      label: Installation
      options:
        - Published container image
        - Release binary
        - Source checkout
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps using synthetic data.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, browser, and container runtime where relevant.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed all secrets, production identifiers, databases, backups, and current codes.
          required: true
